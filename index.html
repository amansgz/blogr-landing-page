<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32x32.png">

  <title>Frontend Mentor | Blogr Landing Page</title>

  <link rel="stylesheet" href="./css/main.css">

  <script src="./js/app.js" defer></script>
</head>

<body>
  <header class="header">

    <div class="container  header__container">

      <!-- Logo -->
      <img class="header__logo" src="./assets/images/logo.svg" alt="Blogr logo" width="100" height="30">

      <!-- Navigation -->

      <nav class="nav  header__nav  row" aria-label="Main navigation">

        <!-- Mobile button hamburger  -->
        <button class="nav__toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false"
          aria-controls="main-menu" id="nav-toggle">

          <img class="icon  icon--hamburger" src="./assets/icons/icon-hamburger.svg" alt="" aria-hidden="true"
            width="24" height="24">
          <img class="icon  icon--close" src="./assets/icons/icon-close.svg" alt="" aria-hidden="true" width="24"
            height="24">

        </button>

        <!-- Main menu navigation -->
        <div class="nav__menu  col  md-row  md-align-center" id="main-menu" aria-labelledby="nav-toggle">

          <ul class="nav__list  col  align-center  md-row  md-align-left">

            <!-- Dropdown 1: Product -->
            <li class="nav__item-dropdown  col  align-center  md-align-left" role="none">

              <button class="nav__btn-dropdown  row  align-center" aria-expanded="false" aria-haspopup="true"
                aria-controls="dropdown-product" id="btn-product">
                Product

                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true" width="12" height="8">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true" width="12" height="8">

              </button>


              <div class="dropdown-menu" id="dropdown-product" aria-labelledby="btn-product">

                <ul class="dropdown-menu__list" role="presentation">

                  <li>
                    <a href="#" class="dropdown-menu__link">Overview</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Pricing</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Marketplace</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Features</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Integrations</a>
                  </li>

                </ul>
              </div>

            </li>

            <!-- Dropdown 2: Company -->
            <li class="nav__item-dropdown  col  align-center  md-align-left" role="none">

              <button class="nav__btn-dropdown  row  align-center" aria-expanded="false" aria-haspopup="true"
                aria-controls="dropdown-company" id="btn-company">
                Company
                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true" width="12" height="8">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true" width="12" height="8">
              </button>

              <div class="dropdown-menu" id="dropdown-company" aria-labelledby="btn-company">

                <ul class="dropdown-menu__list" role="presentation">

                  <li>
                    <a href="#" class="dropdown-menu__link">About</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Team</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Blog</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Careers</a>
                  </li>

                </ul>

              </div>
            </li>

            <!-- Dropdown 3: Connect -->
            <li class="nav__item-dropdown  col  align-center  md-align-left" role="none">

              <button class="nav__btn-dropdown  row  align-center" aria-expanded="false" aria-haspopup="true"
                aria-controls="dropdown-connect" id="btn-connect">
                Connect
                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true" width="12" height="8">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true" width="12" height="8">
              </button>

              <div class="dropdown-menu" id="dropdown-connect" aria-labelledby="btn-connect">

                <ul class="dropdown-menu__list" role="presentation">

                  <li>
                    <a href="#" class="dropdown-menu__link">Contact</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Newsletter</a>
                  </li>
                  <li>
                    <a href="#" class="dropdown-menu__link">Linkedin</a>
                  </li>

                </ul>
              </div>
            </li>

          </ul>

          <hr class="divider" role="separator">

          <!-- Auth buttons -->
          <div class="nav__auth  col  align-center  md-row  md-align-left">
            <a href="#" class="btn  btn--text" role="button">Login</a>
            <a href="#" class="btn  btn--primary" role="button">Sign Up</a>
          </div>

        </div>
      </nav>

    </div>

  </header>

</body>

</html>
