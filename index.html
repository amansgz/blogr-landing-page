<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Blogr Landing Page</title>

  <link rel="stylesheet" href="./css/main.css">

</head>

<body>
  <header class="header">

    <div class="container  header__container">

      <!-- Logo -->
      <img class="header__logo" src="./assets/images/logo.svg" alt="Blogr logo">

      <!-- Navigation -->

      <nav class="nav  header__nav" aria-label="Main navigation">

        <!-- Mobile button hamburger  -->
        <button class="nav__toggle" type="button">

          <img class="nav__toggle-icon  nav__toggle-icon--hamburger" src="./assets/icons/icon-hamburger.svg" alt=""
            aria-hidden="true">
          <img class="nav__toggle-icon  nav__toggle-icon--close" src="./assets/icons/icon-close.svg" alt=""
            aria-hidden="true">

        </button>

        <!-- Main menu navigation -->
        <div class="nav__menu">

          <ul class="nav__list">

            <!-- Dropdown 1: Product -->
            <li class="nav__item-dropdown">

              <button class="nav__btn-dropdown">
                Product

                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true">

              </button>


              <div class="dropdown-menu">

                <ul class="dropdown-menu__list">

                  <li><a href="#" class="dropdown-menu__link">Overview</a></li>
                  <li><a href="#" class="dropdown-menu__link">Pricing</a></li>
                  <li><a href="#" class="dropdown-menu__link">Marketplace</a></li>
                  <li><a href="#" class="dropdown-menu__link">Features</a></li>
                  <li><a href="#" class="dropdown-menu__link">Integrations</a></li>

                </ul>
              </div>

            </li>

            <!-- Dropdown 2: Company -->
            <li class="nav__item-dropdown">

              <button class="nav__btn-dropdown">
                Company
                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true">
              </button>

              <div class="dropdown-menu">

                <ul class="dropdown-menu__list">

                  <li><a href="#" class="dropdown-menu__link">About</a></li>
                  <li><a href="#" class="dropdown-menu__link">Team</a></li>
                  <li><a href="#" class="dropdown-menu__link">Blog</a></li>
                  <li><a href="#" class="dropdown-menu__link">Careers</a></li>

                </ul>

              </div>
            </li>

            <!-- Dropdown 3: Connect -->
            <li class="nav__item-dropdown">

              <button class="nav__btn-dropdown">
                Connect
                <!-- mobile arrow -->
                <img class="icon-arrow  icon-arrow--dark" src="./assets/icons/icon-arrow-dark.svg" alt=""
                  aria-hidden="true">

                <!-- desktop arrow -->
                <img class="icon-arrow  icon-arrow--light" src="./assets/icons/icon-arrow-light.svg" alt=""
                  aria-hidden="true">
              </button>

              <div class="dropdown-menu">

                <ul class="dropdown-menu__list">

                  <li><a href="#" class="dropdown-menu__link">Contact</a></li>
                  <li><a href="#" class="dropdown-menu__link">Newsletter</a></li>
                  <li><a href="#" class="dropdown-menu__link">Linkedin</a></li>

                </ul>
              </div>
            </li>

          </ul>

          <hr class="divider">

          <!-- Auth buttons -->
          <div class="nav__auth">
            <a href="#" class="btn  btn--text">Login</a>
            <a href="#" class="btn  btn--primary">Sign Up</a>
          </div>

        </div>
      </nav>

    </div>

  </header>

</body>

</html>
